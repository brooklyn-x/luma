name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build_ios:
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    type: build
    params:
      platform: android
      profile: production

  submit_ios:
    type: submit
    needs: [build_ios]
    params:
      platform: ios
      profile: production

  submit_android:
    type: submit
    needs: [build_android]
    params:
      platform: android
      profile: production
